<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FoodWagon</title>
  <link rel="stylesheet" href="style18.css" />
</head>
<body>
  <nav class="navbar">
    <div class="logo">🍔 food<b>wagon</b></div>
    <div class="location">📍 Mohammadpur Bus Stand, Dhaka</div>
    <div class="nav-buttons">
      <button>🔍 Search Food</button>
      <button>👤 Login</button>
    </div>
  </nav>
  <section class="hero">
    <div class="hero-text">
      <h1>Are you starving?</h1>
      <p>Within a few clicks, find meals that are accessible near you</p>

      <div class="search-box">
        <div class="tabs">
          <button class="tab active">🚴 Delivery</button>
          <button class="tab">🏪 Pickup</button>
        </div>
        <div class="input-row">
          <input type="text" placeholder="📍 Enter Your Address" />
          <button class="find-btn">🔍 Find Food</button>
        </div>
      </div>
    </div>

    <img class="hero-img" src="https://images.unsplash.com/photo-1569718212165-3a8278d5f624?w=400&q=80" alt="Food" />
  </section>

  <section class="cards">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400&q=80" alt="Food" />
      <span class="badge">15% Off</span>
      <h3>Greys Vage</h3>
      <p class="days">6 Days Remaining</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1473093295043-cdd812d0e601?w=400&q=80" alt="Food" />
      <span class="badge">10% Off</span>
      <h3>Greys Vage</h3>
      <p class="days">6 Days Remaining</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?w=400&q=80" alt="Food" />
      <span class="badge">25% Off</span>
      <h3>Greys Vage</h3>
      <p class="days">7 Days Remaining</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1547592180-85f173990554?w=400&q=80" alt="Food" />
      <span class="badge">20% Off</span>
      <h3>Greys Vage</h3>
      <p class="days">8 Days Remaining</p>
    </div>

  </section>

</body>
</html>
